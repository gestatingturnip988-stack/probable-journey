<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D World with Camera Rotation & Collisions</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-family: monospace;
            z-index: 10;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            z-index: 10;
            display: flex;
            gap: 15px;
        }

        .controls-left {
            left: 20px;
        }

        .controls-right {
            right: 20px;
        }

        #dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
        }

        #cam-controls {
            display: flex;
            gap: 8px;
            align-self: flex-end;
        }

        .btn {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #fff;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
        }

        .cam-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 18px;
        }

        .btn:active {
            background: #00ffcc;
        }

        #btn-up    { grid-column: 2; grid-row: 1; }
        #btn-left  { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down  { grid-column: 2; grid-row: 3; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">Pos: X: 0.0, Z: 0.0 | Cam: 0°</div>
    <div id="canvas-container"></div>

    <div class="controls controls-left">
        <div id="dpad">
            <button id="btn-up" class="btn">UP</button>
            <button id="btn-left" class="btn">LFT</button>
            <button id="btn-right" class="btn">RGT</button>
            <button id="btn-down" class="btn">DWN</button>
        </div>
    </div>

    <div class="controls controls-right">
        <div id="cam-controls">
            <button id="btn-cam-left" class="btn cam-btn">↺</button>
            <button id="btn-cam-right" class="btn cam-btn">↻</button>
        </div>
    </div>

    <script>
        const hud = document.getElementById('hud');

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a24);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. LIGHTS
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(15, 25, 10);
        scene.add(dirLight);

        // 3. WORLD OBJECTS & COLLIDER REGISTRY
        const grid = new THREE.GridHelper(50, 25, 0x00ffcc, 0x334433);
        scene.add(grid);

        // Ground Plane
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(50, 50),
            new THREE.MeshStandardMaterial({ color: 0x182e18 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Player Group (Cube + Front Pointer)
        const playerRadius = 0.6;
        const playerGroup = new THREE.Group();

        const playerCube = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 1.2, 1.2),
            new THREE.MeshStandardMaterial({ color: 0x3388ff })
        );
        playerCube.position.y = 0.6;
        playerGroup.add(playerCube);

        const playerPointer = new THREE.Mesh(
            new THREE.BoxGeometry(0.3, 0.3, 0.3),
            new THREE.MeshStandardMaterial({ color: 0xff3333 })
        );
        playerPointer.position.set(0, 0.6, -0.7);
        playerGroup.add(playerPointer);

        scene.add(playerGroup);

        // Array to store obstacle hitboxes: { x, z, radius }
        const colliders = [];

        // Helper: Create Low-Poly Tree
        function createTree(x, z) {
            const group = new THREE.Group();
            
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.3, 1),
                new THREE.MeshStandardMaterial({ color: 0x5c4033 })
            );
            trunk.position.y = 0.5;
            group.add(trunk);

            const leaves = new THREE.Mesh(
                new THREE.ConeGeometry(1.2, 2.5, 6),
                new THREE.MeshStandardMaterial({ color: 0x2e8b57 })
            );
            leaves.position.y = 2.0;
            group.add(leaves);

            group.position.set(x, 0, z);
            scene.add(group);

            colliders.push({ x: x, z: z, radius: 0.9 });
        }

        // Helper: Create Boulder
        function createBoulder(x, z, scale = 1) {
            const rock = new THREE.Mesh(
                new THREE.DodecahedronGeometry(1 * scale, 1),
                new THREE.MeshStandardMaterial({ color: 0x777788, flatShading: true })
            );
            rock.position.set(x, 0.7 * scale, z);
            rock.rotation.set(Math.random(), Math.random(), Math.random());
            scene.add(rock);

            colliders.push({ x: x, z: z, radius: 1.0 * scale });
        }

        // Helper: Create Bush
        function createBush(x, z) {
            const bush = new THREE.Mesh(
                new THREE.IcosahedronGeometry(0.8, 1),
                new THREE.MeshStandardMaterial({ color: 0x3a9d23, flatShading: true })
            );
            bush.position.set(x, 0.5, z);
            scene.add(bush);

            colliders.push({ x: x, z: z, radius: 0.7 });
        }

        // Helper: Create Idle Creature
        const creatures = [];
        function createCreature(x, z) {
            const group = new THREE.Group();

            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.8, 0.8),
                new THREE.MeshStandardMaterial({ color: 0xaa33ff })
            );
            body.position.y = 0.4;
            group.add(body);

            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const eye1 = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.1), eyeMat);
            eye1.position.set(-0.2, 0.5, 0.41);
            const eye2 = eye1.clone();
            eye2.position.x = 0.2;
            group.add(eye1);
            group.add(eye2);

            group.position.set(x, 0, z);
            scene.add(group);

            creatures.push({ group: group, offset: Math.random() * 10 });
            colliders.push({ x: x, z: z, radius: 0.6 });
        }

        // Populate Scene
        createTree(-6, -6);
        createTree(6, -6);
        createTree(-7, 4);
        createTree(8, 5);

        createBoulder(0, -7, 1.2);
        createBoulder(-4, -2, 0.8);
        createBoulder(5, -1, 1.0);

        createBush(-2, 3);
        createBush(3, 4);
        createBush(-5, -5);

        createCreature(2, -4);
        createCreature(-3, 6);

        // 4. COLLISION DETECTION ENGINE
        function isColliding(targetX, targetZ) {
            for (let i = 0; i < colliders.length; i++) {
                const c = colliders[i];
                const dx = targetX - c.x;
                const dz = targetZ - c.z;
                if (Math.hypot(dx, dz) < (playerRadius + c.radius)) {
                    return true;
                }
            }
            return false;
        }

        // 5. INPUT MANAGEMENT
        const keys = {
            up: false, down: false, left: false, right: false,
            camLeft: false, camRight: false
        };

        function setupButton(id, key) {
            const btn = document.getElementById(id);
            if (!btn) return;

            const press = (e) => {
                if (e.cancelable) e.preventDefault();
                keys[key] = true;
            };
            const release = (e) => {
                if (e.cancelable) e.preventDefault();
                keys[key] = false;
            };

            btn.addEventListener('touchstart', press, { passive: false });
            btn.addEventListener('touchend', release, { passive: false });
            btn.addEventListener('touchcancel', release, { passive: false });
            btn.addEventListener('mousedown', press);
            btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        }

        setupButton('btn-up', 'up');
        setupButton('btn-down', 'down');
        setupButton('btn-left', 'left');
        setupButton('btn-right', 'right');
        setupButton('btn-cam-left', 'camLeft');
        setupButton('btn-cam-right', 'camRight');

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (e.key === 'ArrowUp' || k === 'w') keys.up = true;
            if (e.key === 'ArrowDown' || k === 's') keys.down = true;
            if (e.key === 'ArrowLeft' || k === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || k === 'd') keys.right = true;
            if (k === 'q') keys.camLeft = true;
            if (k === 'e') keys.camRight = true;
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (e.key === 'ArrowUp' || k === 'w') keys.up = false;
            if (e.key === 'ArrowDown' || k === 's') keys.down = false;
            if (e.key === 'ArrowLeft' || k === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || k === 'd') keys.right = false;
            if (k === 'q') keys.camLeft = false;
            if (k === 'e') keys.camRight = false;
        });

        // 6. GAME LOOP & CAMERA
        const clock = new THREE.Clock();
        const moveSpeed = 6;
        const camRotateSpeed = 2.0;

        let cameraAngle = 0;
        const cameraDistance = 14;
        const cameraHeight = 10;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();
            const moveStep = moveSpeed * delta;
            const rotStep = camRotateSpeed * delta;

            // Creature Idle Bobbing
            creatures.forEach(c => {
                c.group.position.y = Math.sin(elapsed * 3 + c.offset) * 0.15;
            });

            // Camera Rotation
            if (keys.camLeft) cameraAngle -= rotStep;
            if (keys.camRight) cameraAngle += rotStep;

            // Direction Vectors aligned with Camera Angle
            let dx = 0;
            let dz = 0;

            if (keys.up) {
                dx -= Math.sin(cameraAngle) * moveStep;
                dz -= Math.cos(cameraAngle) * moveStep;
            }
            if (keys.down) {
                dx += Math.sin(cameraAngle) * moveStep;
                dz += Math.cos(cameraAngle) * moveStep;
            }
            if (keys.left) {
                dx -= Math.cos(cameraAngle) * moveStep;
                dz += Math.sin(cameraAngle) * moveStep;
            }
            if (keys.right) {
                dx += Math.cos(cameraAngle) * moveStep;
                dz -= Math.sin(cameraAngle) * moveStep;
            }

            let isMoving = false;

            // Axis-separated collision sliding
            if (dx !== 0) {
                const nextX = playerGroup.position.x + dx;
                if (!isColliding(nextX, playerGroup.position.z)) {
                    playerGroup.position.x = nextX;
                    isMoving = true;
                }
            }

            if (dz !== 0) {
                const nextZ = playerGroup.position.z + dz;
                if (!isColliding(playerGroup.position.x, nextZ)) {
                    playerGroup.position.z = nextZ;
                    isMoving = true;
                }
            }

            // Rotate Player to face movement direction
            if (dx !== 0 || dz !== 0) {
                const heading = Math.atan2(dx, dz);
                playerGroup.rotation.y = heading + Math.PI;
            }

            // Update Camera Position orbiting around Player
            camera.position.x = playerGroup.position.x + Math.sin(cameraAngle) * cameraDistance;
            camera.position.z = playerGroup.position.z + Math.cos(cameraAngle) * cameraDistance;
            camera.position.y = playerGroup.position.y + cameraHeight;
            camera.lookAt(playerGroup.position.x, playerGroup.position.y + 0.6, playerGroup.position.z);

            // Update HUD
            const camDegrees = Math.round((cameraAngle * 180 / Math.PI) % 360);
            hud.innerText = `Pos: X: ${playerGroup.position.x.toFixed(1)}, Z: ${playerGroup.position.z.toFixed(1)} | Cam: ${camDegrees}°`;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
