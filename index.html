<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D RPG World - Fixed World Alignment</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: monospace, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #hud-bottom-left {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 10;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            pointer-events: none;
        }

        #status-bars {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 130px;
            background: rgba(0,0,0,0.75);
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #444;
        }

        .bar-container {
            width: 100%;
            height: 12px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
            border: 1px solid #555;
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            transition: width 0.15s ease-out;
        }

        .bar-fill.exp { background: #00ffaa; width: 45%; }
        .bar-fill.hp { background: #ff3344; width: 100%; }
        .bar-fill.energy { background: #ffcc00; width: 100%; }

        .bar-label {
            position: absolute;
            top: 0;
            left: 4px;
            font-size: 8px;
            color: #fff;
            line-height: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 1px #000;
        }

        .top-right-menu {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            display: flex;
            gap: 8px;
        }

        .menu-btn {
            width: 44px;
            height: 44px;
            background: rgba(30, 30, 40, 0.85);
            border: 2px solid #fff;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #hotbar {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 6px;
            border-radius: 10px;
            border: 1px solid #555;
        }

        .hotbar-slot {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.15);
            border: 2px solid #aaa;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
            position: relative;
        }

        .hotbar-slot .count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-weight: bold;
            color: #00ffcc;
        }

        .controls-right {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .camera-utility-row {
            display: flex;
            gap: 6px;
        }

        .radial-action-arc {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid #fff;
            border-radius: 8px;
            font-weight: bold;
            font-size: 10px;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
            touch-action: manipulation;
        }

        .action-btn {
            width: 62px;
            height: 40px;
            border-radius: 18px;
            background: #ffaa00;
            color: #000;
            font-size: 9px;
            border: 2px solid #fff;
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .cam-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 13px;
        }

        .mode-btn {
            height: 36px;
            padding: 0 8px;
            border-radius: 18px;
            font-size: 9px;
            background: rgba(0, 255, 204, 0.85);
        }

        #joystick-base {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: relative;
            touch-action: none;
            margin-top: 4px;
        }

        #joystick-knob {
            width: 42px;
            height: 42px;
            background: rgba(0, 255, 204, 0.85);
            border: 2px solid #fff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #mobile-log {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            color: #ff5555;
            background: rgba(0,0,0,0.9);
            padding: 8px;
            font-size: 11px;
            z-index: 999;
            display: none;
            border-radius: 4px;
            max-height: 100px;
            overflow-y: auto;
            border: 1px solid #ff3333;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="mobile-log"></div>
    <div id="canvas-container"></div>

    <div id="hud-bottom-left">
        <div id="status-bars">
            <div class="bar-container"><div class="bar-fill exp"></div><span class="bar-label">EXP Lv.5</span></div>
            <div class="bar-container"><div class="bar-fill hp" id="bar-hp"></div><span class="bar-label">HEALTH</span></div>
            <div class="bar-container"><div class="bar-fill energy" id="bar-energy"></div><span class="bar-label">ENERGY</span></div>
        </div>
    </div>

    <div id="hotbar">
        <div class="hotbar-slot"><span class="icon">🪵</span><span class="count" id="count-wood">0</span></div>
        <div class="hotbar-slot"><span class="icon">🪨</span><span class="count" id="count-stone">0</span></div>
        <div class="hotbar-slot"><span class="icon">🫐</span><span class="count" id="count-berry">0</span></div>
    </div>

    <div class="controls-right">
        <div class="camera-utility-row">
            <button id="btn-cam-left" class="btn cam-btn">↺</button>
            <button id="btn-cam-mode" class="btn mode-btn">🔒 FREE</button>
            <button id="btn-cam-right" class="btn cam-btn">↻</button>
        </div>

        <div class="radial-action-arc">
            <button id="btn-attack" class="btn action-btn">ATTACK ⚔️</button>
            <button id="btn-interact" class="btn action-btn">INTERACT 🤝</button>
            <button id="btn-jump" class="btn action-btn">JUMP 🦘</button>
            <button id="btn-bow" class="btn action-btn">BOW 🏹</button>
        </div>

        <div id="joystick-base">
            <div id="joystick-knob"></div>
        </div>
    </div>

    <script>
        function showMobileError(msg) {
            const logEl = document.getElementById('mobile-log');
            if (logEl) {
                logEl.style.display = 'block';
                logEl.innerText += '[ERR] ' + msg + '\n';
            }
        }

        window.onerror = function(msg, url, lineNo) {
            showMobileError(msg + " (line " + lineNo + ")");
            return false;
        };

        window.addEventListener('DOMContentLoaded', () => {
            try {
                const container = document.getElementById('canvas-container');
                if (!container) return;

                const maxEnergy = 100;
                let currentEnergy = 100;
                let currentHP = 100;
                const inventory = { wood: 0, stone: 0, berry: 0 };

                function updateDisplays() {
                    const barE = document.getElementById('bar-energy');
                    const barH = document.getElementById('bar-hp');
                    if (barE) barE.style.width = Math.max(0, (currentEnergy / maxEnergy) * 100) + '%';
                    if (barH) barH.style.width = Math.max(0, currentHP) + '%';
                }

                function updateInventoryUI() {
                    ['wood', 'stone', 'berry'].forEach(k => {
                        const el = document.getElementById('count-' + k);
                        if (el) el.innerText = inventory[k] || 0;
                    });
                }

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x111622);

                const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const sunLight = new THREE.DirectionalLight(0xfffaed, 0.9);
                sunLight.position.set(30, 50, 20);
                scene.add(sunLight);

                const WORLD_SIZE = 140;

                // Terrain Elevation Math Function
                function getTerrainHeight(x, z) {
                    if (x < -35) return -2.0; // Water basin
                    return Math.sin(x * 0.08) * Math.cos(z * 0.08) * 3.0;
                }

                const groundGeo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 40, 40);
                groundGeo.rotateX(-Math.PI / 2);
                const pos = groundGeo.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    const vx = pos.getX(i);
                    const vz = pos.getZ(i);
                    pos.setY(i, getTerrainHeight(vx, vz));
                }
                groundGeo.computeVertexNormals();

                const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d4a2d, flatShading: true });
                const groundMesh = new THREE.Mesh(groundGeo, groundMat);
                scene.add(groundMesh);

                // Water Surface
                const waterMesh = new THREE.Mesh(
                    new THREE.PlaneGeometry(50, WORLD_SIZE),
                    new THREE.MeshStandardMaterial({ color: 0x0066aa, transparent: true, opacity: 0.7 })
                );
                waterMesh.rotation.x = -Math.PI / 2;
                waterMesh.position.set(-55, -1.0, 0);
                scene.add(waterMesh);

                // Player Setup
                const playerGroup = new THREE.Group();
                const playerMesh = new THREE.Mesh(
                    new THREE.BoxGeometry(1.2, 1.6, 1.2),
                    new THREE.MeshStandardMaterial({ color: 0x3388ff })
                );
                playerMesh.position.y = 0.8;
                playerGroup.add(playerMesh);

                playerGroup.position.set(-20, getTerrainHeight(-20, 0), 0);
                scene.add(playerGroup);

                let playerVY = 0;
                let isGrounded = true;

                const harvestables = [];
                const creatures = [];

                function addResource(type, x, z) {
                    const g = new THREE.Group();
                    let dropType = 'wood';
                    let hp = 3;

                    if (type === 'oak') {
                        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1.5), new THREE.MeshStandardMaterial({ color: 0x4a2e12 }));
                        trunk.position.y = 0.75;
                        const top = new THREE.Mesh(new THREE.DodecahedronGeometry(1.4), new THREE.MeshStandardMaterial({ color: 0x1e6b27 }));
                        top.position.y = 2.2;
                        g.add(trunk, top);
                        dropType = 'wood';
                    } else if (type === 'ore') {
                        const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.9, 1), new THREE.MeshStandardMaterial({ color: 0x667788 }));
                        rock.position.y = 0.5;
                        g.add(rock);
                        dropType = 'stone';
                        hp = 4;
                    } else if (type === 'bush') {
                        const bush = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7), new THREE.MeshStandardMaterial({ color: 0x33aa33 }));
                        bush.position.y = 0.4;
                        g.add(bush);
                        dropType = 'berry';
                        hp = 2;
                    }

                    const groundY = getTerrainHeight(x, z);
                    g.position.set(x, groundY, z);
                    scene.add(g);
                    harvestables.push({ mesh: g, dropType, hp, x, z });
                }

                for (let i = 0; i < 35; i++) {
                    const rx = (Math.random() - 0.3) * (WORLD_SIZE - 30);
                    const rz = (Math.random() - 0.5) * (WORLD_SIZE - 30);
                    const types = ['oak', 'ore', 'bush'];
                    addResource(types[Math.floor(Math.random() * types.length)], rx, rz);
                }

                // Joystick & Movement
                let joystickVector = { x: 0, y: 0 };
                const baseEl = document.getElementById('joystick-base');
                const knobEl = document.getElementById('joystick-knob');

                function handleJoystick(e) {
                    e.preventDefault();
                    const rect = baseEl.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    const touch = e.touches ? e.touches[0] : e;

                    let dx = touch.clientX - cx;
                    let dy = touch.clientY - cy;
                    const dist = Math.hypot(dx, dy);

                    if (dist > 40) { dx = (dx / dist) * 40; dy = (dy / dist) * 40; }
                    knobEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    joystickVector = dist < 5 ? { x: 0, y: 0 } : { x: dx / 40, y: dy / 40 };
                }

                function resetJoystick() {
                    knobEl.style.transform = `translate(-50%, -50%)`;
                    joystickVector = { x: 0, y: 0 };
                }

                baseEl.addEventListener('pointerdown', (e) => { baseEl.setPointerCapture(e.pointerId); handleJoystick(e); });
                baseEl.addEventListener('pointermove', (e) => { if (baseEl.hasPointerCapture(e.pointerId)) handleJoystick(e); });
                baseEl.addEventListener('pointerup', (e) => { baseEl.releasePointerCapture(e.pointerId); resetJoystick(); });

                // Camera Logic
                let isAutoCam = false;
                let cameraAngle = 0;
                let camRotInput = 0;
                const camModeBtn = document.getElementById('btn-cam-mode');
                if (camModeBtn) {
                    camModeBtn.onclick = () => {
                        isAutoCam = !isAutoCam;
                        camModeBtn.innerText = isAutoCam ? '🎥 AUTO' : '🔒 FREE';
                        camModeBtn.style.background = isAutoCam ? '#ffaa00' : 'rgba(0, 255, 204, 0.85)';
                    };
                }

                function bindCam(id, val) {
                    const b = document.getElementById(id);
                    if (!b) return;
                    b.addEventListener('pointerdown', () => camRotInput = val);
                    b.addEventListener('pointerup', () => camRotInput = 0);
                }
                bindCam('btn-cam-left', -1);
                bindCam('btn-cam-right', 1);

                // Game Loop
                const clock = new THREE.Clock();

                function animate() {
                    requestAnimationFrame(animate);
                    const delta = clock.getDelta();

                    if (camRotInput !== 0) cameraAngle += camRotInput * 2.0 * delta;

                    const jx = joystickVector.x;
                    const jy = joystickVector.y;

                    if (Math.abs(jx) > 0.05 || Math.abs(jy) > 0.05) {
                        const moveSpeed = 8;
                        const dx = (jx * Math.cos(cameraAngle) + jy * Math.sin(cameraAngle)) * moveSpeed * delta;
                        const dz = (-jx * Math.sin(cameraAngle) + jy * Math.cos(cameraAngle)) * moveSpeed * delta;

                        playerGroup.position.x += dx;
                        playerGroup.position.z += dz;

                        const targetAngle = Math.atan2(dx, dz);
                        playerGroup.rotation.y = targetAngle;

                        // Auto Camera Follow Logic
                        if (isAutoCam && camRotInput === 0) {
                            let desiredAngle = targetAngle + Math.PI;
                            let diff = desiredAngle - cameraAngle;
                            diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                            cameraAngle += diff * delta * 2.0;
                        }
                    }

                    // Stick Player to Terrain Height
                    const currentGroundY = getTerrainHeight(playerGroup.position.x, playerGroup.position.z);
                    if (isGrounded) {
                        playerGroup.position.y = currentGroundY;
                    } else {
                        playerGroup.position.y += playerVY;
                        playerVY -= 0.8 * delta;
                        if (playerGroup.position.y <= currentGroundY) {
                            playerGroup.position.y = currentGroundY;
                            playerVY = 0;
                            isGrounded = true;
                        }
                    }

                    // Camera Position Update
                    camera.position.x = playerGroup.position.x + Math.sin(cameraAngle) * 14;
                    camera.position.z = playerGroup.position.z + Math.cos(cameraAngle) * 14;
                    camera.position.y = playerGroup.position.y + 10;
                    camera.lookAt(playerGroup.position.x, playerGroup.position.y + 0.8, playerGroup.position.z);

                    renderer.render(scene, camera);
                }

                animate();

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (err) {
                showMobileError(err.message);
            }
        });
    </script>
</body>
</html>
