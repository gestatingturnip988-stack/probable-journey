<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Prototype Reboot</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-family: monospace;
            z-index: 10;
        }

        /* Fixed container positioning */
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        #dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #fff;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
        }

        .btn:active {
            background: #00ffcc;
        }

        #btn-up    { grid-column: 2; grid-row: 1; }
        #btn-left  { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down  { grid-column: 2; grid-row: 3; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">Pos: X: 0.0, Z: 0.0</div>
    <div id="canvas-container"></div>

    <div class="controls">
        <div id="dpad">
            <button id="btn-up" class="btn">UP</button>
            <button id="btn-left" class="btn">LFT</button>
            <button id="btn-right" class="btn">RGT</button>
            <button id="btn-down" class="btn">DWN</button>
        </div>
    </div>

    <script>
        const hud = document.getElementById('hud');

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202028);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. LIGHTS
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 3. WORLD OBJECTS
        const grid = new THREE.GridHelper(40, 20, 0x00ffcc, 0x444444);
        scene.add(grid);

        const player = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 1.2, 1.2),
            new THREE.MeshStandardMaterial({ color: 0x3388ff })
        );
        player.position.y = 0.6;
        scene.add(player);

        const treeGeo = new THREE.ConeGeometry(0.8, 3, 8);
        const treeMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
        const positions = [{x:-5, z:-5}, {x:5, z:-5}, {x:-5, z:5}, {x:5, z:5}];

        positions.forEach(p => {
            const tree = new THREE.Mesh(treeGeo, treeMat);
            tree.position.set(p.x, 1.5, p.z);
            scene.add(tree);
        });

        // 4. INPUT MANAGEMENT
        const keys = { up: false, down: false, left: false, right: false };

        function setupButton(id, key) {
            const btn = document.getElementById(id);
            
            const press = (e) => {
                if (e.cancelable) e.preventDefault();
                keys[key] = true;
            };
            const release = (e) => {
                if (e.cancelable) e.preventDefault();
                keys[key] = false;
            };

            btn.addEventListener('touchstart', press, { passive: false });
            btn.addEventListener('touchend', release, { passive: false });
            btn.addEventListener('touchcancel', release, { passive: false }); // FIX #1: Handled touchcancel
            btn.addEventListener('mousedown', press);
            btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        }

        setupButton('btn-up', 'up');
        setupButton('btn-down', 'down');
        setupButton('btn-left', 'left');
        setupButton('btn-right', 'right');

        // Keyboard Controls Fallback (FIX #2: Case insensitive WASD)
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (e.key === 'ArrowUp' || k === 'w') keys.up = true;
            if (e.key === 'ArrowDown' || k === 's') keys.down = true;
            if (e.key === 'ArrowLeft' || k === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || k === 'd') keys.right = true;
        });
        
        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (e.key === 'ArrowUp' || k === 'w') keys.up = false;
            if (e.key === 'ArrowDown' || k === 's') keys.down = false;
            if (e.key === 'ArrowLeft' || k === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || k === 'd') keys.right = false;
        });

        // 5. GAME LOOP
        const clock = new THREE.Clock();
        const speed = 6;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const moveStep = speed * delta;

            let isMoving = false;

            if (keys.up) { player.position.z -= moveStep; isMoving = true; }
            if (keys.down) { player.position.z += moveStep; isMoving = true; }
            if (keys.left) { player.position.x -= moveStep; isMoving = true; }
            if (keys.right) { player.position.x += moveStep; isMoving = true; }

            // Camera follows player position
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 12;
            camera.lookAt(player.position);

            // FIX #3: Only update DOM when movement actually happens
            if (isMoving) {
                hud.innerText = `Pos: X: ${player.position.x.toFixed(1)}, Z: ${player.position.z.toFixed(1)}`;
            }

            renderer.render(scene, camera);
        }

        animate();

        // Responsive Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
