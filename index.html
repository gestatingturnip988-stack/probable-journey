<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Mechanical Hub Prototype</title>
    
    <style>
        * {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
        }

        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background-color: #000;
        }

        #game-canvas { 
            width: 100vw; 
            height: 100vh; 
            display: block; 
            position: absolute;
            top: 0; 
            left: 0;
            z-index: 1;
        }

        #debug-hud {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ffffff;
            font-family: monospace;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 14px;
            border-radius: 6px;
            z-index: 999;
            pointer-events: none;
            line-height: 1.4;
        }
        
        #dpad-container {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 130px;
            height: 130px;
            display: grid;
            grid-template-columns: 42px 42px 42px;
            grid-template-rows: 42px 42px 42px;
            z-index: 999;
        }
        
        #cam-container {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 110px;
            display: flex;
            justify-content: space-between;
            z-index: 999;
        }
        
        .ui-btn {
            background-color: rgba(255, 255, 255, 0.5);
            border: 2px solid white;
            border-radius: 10px;
            color: black;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        
        .cam-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }
        
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-down { grid-column: 2; grid-row: 3; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="debug-hud">
        State: READY<br>
        Input: IDLE<br>
        Pos: X: 0.0, Z: 0.0
    </div>
    <div id="game-canvas"></div>

    <div id="dpad-container">
        <div id="btn-up" class="ui-btn">UP</div>
        <div id="btn-left" class="ui-btn">LFT</div>
        <div id="btn-right" class="ui-btn">RGT</div>
        <div id="btn-down" class="ui-btn">DWN</div>
    </div>

    <div id="cam-container">
        <div id="btn-cam-left" class="ui-btn cam-btn">↺</div>
        <div id="btn-cam-right" class="ui-btn cam-btn">↻</div>
    </div>

    <script>
        const debugHud = document.getElementById('debug-hud');

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-canvas').appendChild(renderer.domElement);

        const clock = new THREE.Clock();

        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

            new THREE.PlaneGeometry(100, 100), 
            new THREE.MeshStandardMaterial({ color: 0x224422 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Grid overlay (essential for seeing movement relative to camera)
        const grid = new THREE.GridHelper(100, 50, 0x00ff00, 0x448844);
        grid.position.y = 0.01; // Slightly above ground to prevent flickering
        scene.add(grid);

        const playerGroup = new THREE.Group();
        
        const playerCube = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 1.2, 1.2), 
            new THREE.MeshStandardMaterial({ color: 0x3388ff })
        );
        playerCube.position.y = 0.6;
        playerGroup.add(playerCube);

        // Red "Nose" box attached to player front so rotation is obvious
        const playerNose = new THREE.Mesh(
            new THREE.BoxGeometry(0.4, 0.4, 0.4), 
            new THREE.MeshStandardMaterial({ color: 0xff3333 })
        );
        playerNose.position.set(0, 0.6, -0.7);
        playerGroup.add(playerNose);

        scene.add(playerGroup);
        
        // Red Marker Cones around origin

            { x: -5, z: 5 },  { x: 5, z: 5 },
            { x: 0, z: -10 }
        ];

        const treeGeo = new THREE.ConeGeometry(0.8, 3, 8);
        const treeMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });

            const tree = new THREE.Mesh(treeGeo, treeMat);
            tree.position.set(pos.x, 1.5, pos.z);
            scene.add(tree);
        });
