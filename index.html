<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D RPG World Prototype</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: monospace, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- UI OVERLAYS --- */
        #hud-top-left {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            background: rgba(0,0,0,0.75);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 10;
            border: 1px solid #444;
            pointer-events: none;
        }

        .top-right-menu {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .menu-btn {
            width: 44px;
            height: 44px;
            background: rgba(30, 30, 40, 0.85);
            border: 2px solid #fff;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }

        .menu-btn:active { background: #00ffcc; color: #000; }

        /* Bottom Center Hotbar */
        #hotbar {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 6px;
            border-radius: 10px;
            border: 1px solid #555;
        }

        .hotbar-slot {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border: 2px solid #aaa;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
            position: relative;
        }

        .hotbar-slot .icon { font-size: 14px; }
        .hotbar-slot .count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-weight: bold;
            color: #00ffcc;
        }

        /* --- RIGHT CONTROL PANEL --- */
        .controls-right {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .radial-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid #fff;
            border-radius: 8px;
            font-weight: bold;
            font-size: 12px;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
            touch-action: manipulation;
        }

        .action-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #ffaa00;
            color: #000;
            font-size: 11px;
            border: 2px solid #fff;
        }

        .cam-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 14px;
        }

        .btn:active { background: #00ffcc !important; }

        /* Virtual Joystick */
        #joystick-base {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: relative;
            touch-action: none;
        }

        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 204, 0.85);
            border: 2px solid #fff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Inventory Modal */
        #inventory-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            max-width: 320px;
            background: rgba(20, 20, 30, 0.95);
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            z-index: 100;
            display: none;
        }

        #inventory-modal h3 {
            margin: 0 0 10px 0;
            text-align: center;
            color: #00ffcc;
            font-size: 14px;
        }

        .inv-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .inv-slot {
            background: rgba(255,255,255,0.1);
            border: 1px solid #666;
            height: 55px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        #close-inv-btn {
            width: 100%;
            padding: 8px;
            background: #ff4444;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
        }

        #mobile-log {
            position: absolute;
            top: 45px;
            left: 10px;
            right: 10px;
            color: #ff5555;
            background: rgba(0,0,0,0.85);
            padding: 6px;
            font-size: 10px;
            z-index: 100;
            display: none;
            border-radius: 4px;
            max-height: 80px;
            overflow-y: auto;
        }
    </style>
