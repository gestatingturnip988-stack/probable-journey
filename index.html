<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Console RPG World</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b101d;
            font-family: monospace, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- HUD OVERLAYS (Matching Sketch Layout) --- */
        #hud-bottom-left {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 10;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            pointer-events: none;
        }

        #minimap-box {
            width: 80px;
            height: 80px;
            background: rgba(10, 15, 25, 0.85);
            border: 2px solid #00ffcc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ffcc;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        #status-bars {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 130px;
            background: rgba(0,0,0,0.75);
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #444;
        }

        .bar-container {
            width: 100%;
            height: 11px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
            border: 1px solid #555;
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            transition: width 0.15s ease-out;
        }

        .bar-fill.exp { background: #00ffaa; width: 45%; }
        .bar-fill.hp { background: #ff3344; width: 100%; }
        .bar-fill.energy { background: #ffcc00; width: 100%; }
        .bar-fill.hunger { background: #a66a38; width: 65%; }

        .bar-label {
            position: absolute;
            top: 0;
            left: 4px;
            font-size: 8px;
            color: #fff;
            line-height: 11px;
            font-weight: bold;
            text-shadow: 1px 1px 1px #000;
        }

        .top-right-menu {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }

        .menu-btn {
            width: 44px;
            height: 44px;
            background: rgba(30, 30, 40, 0.85);
            border: 2px solid #fff;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }

        .menu-btn:active { background: #00ffcc; color: #000; }

        /* Bottom Center Hotbar */
        #hotbar {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 6px;
            border-radius: 10px;
            border: 1px solid #555;
        }

        .hotbar-slot {
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.15);
            border: 2px solid #aaa;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
            position: relative;
        }

        .hotbar-slot .icon { font-size: 14px; }
        .hotbar-slot .count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-weight: bold;
            color: #00ffcc;
        }

        /* --- RIGHT CONTROLS & RADIAL ARC --- */
        .controls-right {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .camera-utility-row {
            display: flex;
            gap: 6px;
        }

        .radial-action-arc {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid #fff;
            border-radius: 8px;
            font-weight: bold;
            font-size: 11px;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
            touch-action: manipulation;
        }

        .action-btn {
            width: 62px;
            height: 40px;
            border-radius: 18px;
            background: #ffaa00;
            color: #000;
            font-size: 9px;
            border: 2px solid #fff;
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .action-btn:active { background: #00ffcc; }

        .cam-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 14px;
        }

        .mode-btn {
            height: 38px;
            padding: 0 8px;
            border-radius: 18px;
            font-size: 10px;
            background: rgba(0, 255, 204, 0.85);
        }

        #joystick-base {
            width: 110px;
            height: 110px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: relative;
            touch-action: none;
            margin-top: 4px;
        }

        #joystick-knob {
            width: 46px;
            height: 46px;
            background: rgba(0, 255, 204, 0.85);
            border: 2px solid #fff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* --- FULL MENU INTERFACE --- */
        #menu-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92vw;
            height: 85vh;
            max-width: 750px;
            max-height: 500px;
            background: rgba(18, 22, 32, 0.96);
            border: 2px solid #00ffcc;
            border-radius: 12px;
            z-index: 100;
            display: none;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 14, 22, 0.9);
            padding: 8px 16px;
            border-bottom: 2px solid #334455;
        }

        .menu-header h2 {
            margin: 0;
            color: #00ffcc;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .close-btn {
            background: #ff4444;
            color: #fff;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
        }

        .menu-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .equipment-panel {
            width: 48%;
            background: rgba(255, 255, 255, 0.03);
            border-right: 2px solid #334455;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .paperdoll-container {
            display: grid;
            grid-template-columns: 50px 1fr 50px;
            gap: 8px;
            width: 100%;
            height: 100%;
            align-items: center;
        }

        .equip-column {
            display: flex;
            flex-direction: column;
            gap: 6px;
            justify-content: center;
        }

        .equip-slot {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #667788;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .equip-slot .slot-label {
            font-size: 7px;
            color: #8899aa;
            position: absolute;
            top: 2px;
            left: 3px;
        }

        .character-avatar-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #445566;
            border-radius: 8px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #00ffcc;
            font-size: 11px;
            text-align: center;
        }

        .inventory-panel {
            width: 52%;
            display: flex;
            flex-direction: column;
        }

        .tab-bar {
            display: flex;
            background: rgba(10, 14, 22, 0.8);
            border-bottom: 1px solid #334455;
        }

        .tab-btn {
            flex: 1;
            padding: 8px 4px;
            background: transparent;
            border: none;
            color: #8899aa;
            font-size: 12px;
            text-align: center;
        }

        .tab-btn.active {
            color: #00ffcc;
            border-bottom: 2px solid #00ffcc;
            background: rgba(0, 255, 204, 0.1);
        }

        .tab-content {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .inv-grid-large {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .inv-item-slot {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #556677;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
            position: relative;
        }

        .inv-item-slot .qty {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 9px;
            color: #00ffcc;
            font-weight: bold;
        }

        #mobile-log {
            position: absolute;
            top: 45px;
            left: 10px;
            right: 10px;
            color: #ff5555;
            background: rgba(0,0,0,0.85);
            padding: 6px;
            font-size: 10px;
            z-index: 100;
            display: none;
            border-radius: 4px;
            max-height: 80px;
            overflow-y: auto;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="mobile-log"></div>
    <div id="canvas-container"></div>

    <div id="hud-bottom-left">
        <div id="minimap-box">MAP</div>
        <div id="status-bars">
            <div class="bar-container"><div class="bar-fill exp"></div><span class="bar-label">EXP Lv.5</span></div>
            <div class="bar-container"><div class="bar-fill hp" id="bar-hp"></div><span class="bar-label">HEALTH</span></div>
            <div class="bar-container"><div class="bar-fill energy" id="bar-energy"></div><span class="bar-label">ENERGY</span></div>
            <div class="bar-container"><div class="bar-fill hunger"></div><span class="bar-label">HUNGER</span></div>
        </div>
    </div>

    <div class="top-right-menu">
        <button id="btn-menu-open" class="menu-btn">🎒</button>
    </div>

    <div id="hotbar">
        <div class="hotbar-slot"><span class="icon">🪵</span><span class="count" id="count-wood">0</span></div>
        <div class="hotbar-slot"><span class="icon">🪨</span><span class="count" id="count-stone">0</span></div>
        <div class="hotbar-slot"><span class="icon">🫐</span><span class="count" id="count-berry">0</span></div>
        <div class="hotbar-slot"><span class="icon">🍄</span><span class="count" id="count-shroom">0</span></div>
    </div>

    <div class="controls-right">
        <div class="camera-utility-row">
            <button id="btn-cam-left" class="btn cam-btn">↺</button>
            <button id="btn-cam-mode" class="btn mode-btn">🔒 FREE</button>
            <button id="btn-cam-right" class="btn cam-btn">↻</button>
        </div>

        <div class="radial-action-arc">
            <button id="btn-attack" class="btn action-btn">ATTACK ⚔️</button>
            <button id="btn-interact" class="btn action-btn">INTERACT 🤝</button>
            <button id="btn-jump" class="btn action-btn">JUMP 🦘</button>
            <button id="btn-build" class="btn action-btn">BUILD 🧱</button>
        </div>

        <div id="joystick-base">
            <div id="joystick-knob"></div>
        </div>
    </div>

    <div id="menu-modal">
        <div class="menu-header">
            <h2>CHARACTER & INVENTORY</h2>
            <button id="btn-menu-close" class="close-btn">✕ CLOSE</button>
        </div>
        <div class="menu-body">
            <div class="equipment-panel">
                <div class="paperdoll-container">
                    <div class="equip-column">
                        <div class="equip-slot"><span class="slot-label">MAIN</span><span>🪓</span></div>
                        <div class="equip-slot"><span class="slot-label">HEAD</span></div>
                        <div class="equip-slot"><span class="slot-label">CHEST</span></div>
                    </div>
                    <div class="character-avatar-box">
                        <div style="font-size: 40px; margin-bottom: 4px;">🧍</div>
                        <b>Generic Character</b>
                        <span style="font-size:9px; color:#888;">Lv. 5 Adventurer</span>
                    </div>
                    <div class="equip-column">
                        <div class="equip-slot"><span class="slot-label">OFF</span></div>
                        <div class="equip-slot"><span class="slot-label">LEGS</span></div>
                        <div class="equip-slot"><span class="slot-label">FEET</span></div>
                    </div>
                </div>
            </div>
            <div class="inventory-panel">
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="switchTab('inv')">🎒</button>
                    <button class="tab-btn" onclick="switchTab('skills')">⚡</button>
                </div>
                <div class="tab-content" id="tab-inv">
                    <div class="inv-grid-large" id="inventory-grid"></div>
                </div>
                <div class="tab-content" id="tab-skills" style="display:none; color:#aaa; font-size:11px;">
                    <p><b>Lumberjack Lv.2</b> - +10% Wood harvest yield.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showMobileError(msg) {
            const logEl = document.getElementById('mobile-log');
            logEl.style.display = 'block';
            logEl.innerText += '[ERR] ' + msg + '\n';
        }

        window.onerror = function(msg, url, lineNo) {
            showMobileError(msg + " (line " + lineNo + ")");
            return false;
        };

        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('canvas-container');
            if (!container) return;

            // Energy & Inventory State
            let currentEnergy = 100;
            let currentHP = 100;
            const inventory = { wood: 0, stone: 0, berry: 0, shroom: 0 };

            function updateUI() {
                document.getElementById('bar-energy').style.width = currentEnergy + '%';
                document.getElementById('bar-hp').style.width = currentHP + '%';
                document.getElementById('count-wood').innerText = inventory.wood;
                document.getElementById('count-stone').innerText = inventory.stone;
                document.getElementById('count-berry').innerText = inventory.berry;
                document.getElementById('count-shroom').innerText = inventory.shroom;

                const invGrid = document.getElementById('inventory-grid');
                if (invGrid) {
                    invGrid.innerHTML = '';
                    const items = [
                        { icon: '🪵', count: inventory.wood },
                        { icon: '🪨', count: inventory.stone },
                        { icon: '🫐', count: inventory.berry },
                        { icon: '🍄', count: inventory.shroom }
                    ];
                    items.forEach(item => {
                        if (item.count > 0) {
                            const slot = document.createElement('div');
                            slot.className = 'inv-item-slot';
                            slot.innerHTML = `<span>${item.icon}</span><span class="qty">${item.count}</span>`;
                            invGrid.appendChild(slot);
                        }
                    });
                }
            }

            window.switchTab = function(tabName) {
                document.getElementById('tab-inv').style.display = (tabName === 'inv') ? 'block' : 'none';
                document.getElementById('tab-skills').style.display = (tabName === 'skills') ? 'block' : 'none';
            };

            // --- 3D Scene Setup ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x7ec0ee); // Sky blue
            scene.fog = new THREE.FogExp2(0x7ec0ee, 0.015);

            // 3rd Person Perspective Camera (Over the Shoulder / Behind Back)
            const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.75));
            const sunLight = new THREE.DirectionalLight(0xfffaed, 0.85);
            sunLight.position.set(25, 50, 15);
            scene.add(sunLight);

            // Terrain Elevation Height Function
            const WORLD_SIZE = 120;
            function getTerrainHeight(x, z) {
                return Math.sin(x * 0.08) * Math.cos(z * 0.08) * 2.2;
            }

            const groundGeo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 40, 40);
            groundGeo.rotateX(-Math.PI / 2);
            const pos = groundGeo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                pos.setY(i, getTerrainHeight(pos.getX(i), pos.getZ(i)));
            }
            groundGeo.computeVertexNormals();

            const groundMesh = new THREE.Mesh(
                groundGeo, 
                new THREE.MeshStandardMaterial({ color: 0x4a7c4e, flatShading: true })
            );
            scene.add(groundMesh);

            // --- Player Character (Realistic 1:1 Scale relative to trees) ---
            const playerGroup = new THREE.Group();
            
            // Body (Height = 1.8m)
            const bodyMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.7, 1.2, 0.5),
                new THREE.MeshStandardMaterial({ color: 0x3388ff, flatShading: true })
            );
            bodyMesh.position.y = 0.9;
            playerGroup.add(bodyMesh);

            // Head
            const headMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.5, 0.5),
                new THREE.MeshStandardMaterial({ color: 0xffcc99, flatShading: true })
            );
            headMesh.position.y = 1.75;
            playerGroup.add(headMesh);

            // Direction Pointer / Facing Indicator
            const pointerMesh = new THREE.Mesh(
                new THREE.ConeGeometry(0.2, 0.5, 4),
                new THREE.MeshStandardMaterial({ color: 0xff3333 })
            );
            pointerMesh.rotation.x = -Math.PI / 2;
            pointerMesh.position.set(0, 1.0, 0.6);
            playerGroup.add(pointerMesh);

            playerGroup.position.set(0, getTerrainHeight(0, 0), 0);
            scene.add(playerGroup);

            let playerVY = 0;
            let isGrounded = true;

            // Target Ring Marker (matching your sketch)
            const targetRing = new THREE.Mesh(
                new THREE.RingGeometry(0.8, 1.0, 16),
                new THREE.MeshBasicMaterial({ color: 0x00ffcc, side: THREE.DoubleSide })
            );
            targetRing.rotation.x = -Math.PI / 2;
            targetRing.visible = false;
            scene.add(targetRing);

            // --- Environmental Objects (Trees, Rocks, Bushes scaled tall) ---
            const harvestables = [];

            function spawnProp(type, x, z) {
                const g = new THREE.Group();
                let dropType = 'wood';
                let propRadius = 1.0;

                if (type === 'tree') {
                    // Tree Trunk: 5.5m tall (Realistic proportion)
                    const trunk = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.4, 0.6, 3.5), 
                        new THREE.MeshStandardMaterial({ color: 0x5a3d28, flatShading: true })
                    );
                    trunk.position.y = 1.75;
                    
                    const foliage = new THREE.Mesh(
                        new THREE.ConeGeometry(2.2, 5.0, 6), 
                        new THREE.MeshStandardMaterial({ color: 0x2e8b57, flatShading: true })
                    );
                    foliage.position.y = 5.0;
                    g.add(trunk, foliage);
                    dropType = 'wood';
                    propRadius = 1.2;
                } else if (type === 'stone') {
                    const rock = new THREE.Mesh(
                        new THREE.DodecahedronGeometry(1.2, 1), 
                        new THREE.MeshStandardMaterial({ color: 0x778899, flatShading: true })
                    );
                    rock.position.y = 0.8;
                    g.add(rock);
                    dropType = 'stone';
                    propRadius = 1.1;
                } else if (type === 'bush') {
                    const bush = new THREE.Mesh(
                        new THREE.IcosahedronGeometry(0.9, 1), 
                        new THREE.MeshStandardMaterial({ color: 0x3a9d23, flatShading: true })
                    );
                    bush.position.y = 0.6;
                    g.add(bush);
                    dropType = 'berry';
                    propRadius = 0.9;
                }

                const groundY = getTerrainHeight(x, z);
                g.position.set(x, groundY, z);
                scene.add(g);
                harvestables.push({ mesh: g, dropType, hp: 3, x, z, radius: propRadius });
            }

            for (let i = 0; i < 45; i++) {
                const rx = (Math.random() - 0.5) * 90;
                const rz = (Math.random() - 0.5) * 90;
                if (Math.hypot(rx, rz) < 6) continue; // Keep clear spawn area

                const r = Math.random();
                if (r < 0.5) spawnProp('tree', rx, rz);
                else if (r < 0.8) spawnProp('stone', rx, rz);
                else spawnProp('bush', rx, rz);
            }

            // --- Attack & Interaction ---
            let attackTimer = 0;
            const attackBtn = document.getElementById('btn-attack');
            
            attackBtn.addEventListener('pointerdown', () => attackTimer = Date.now());
            attackBtn.addEventListener('pointerup', () => {
                const isPower = (Date.now() - attackTimer) > 300;
                const reach = isPower ? 2.8 : 2.0;

                for (let i = harvestables.length - 1; i >= 0; i--) {
                    const h = harvestables[i];
                    const dist = Math.hypot(playerGroup.position.x - h.x, playerGroup.position.z - h.z);
                    if (dist < reach) {
                        h.hp -= isPower ? 2 : 1;
                        if (h.hp <= 0) {
                            inventory[h.dropType] += isPower ? 2 : 1;
                            updateUI();
                            scene.remove(h.mesh);
                            harvestables.splice(i, 1);
                            targetRing.visible = false;
                        }
                        break;
                    }
                }
            });

            document.getElementById('btn-jump').onclick = () => {
                if (isGrounded) {
                    playerVY = 0.24;
                    isGrounded = false;
                }
            };

            document.getElementById('btn-build').onclick = () => {
                if (inventory.wood >= 2) {
                    inventory.wood -= 2;
                    updateUI();

                    const wall = new THREE.Mesh(
                        new THREE.BoxGeometry(2.5, 2.0, 0.4),
                        new THREE.MeshStandardMaterial({ color: 0x8b5a2b, flatShading: true })
                    );
                    const spawnX = playerGroup.position.x + Math.sin(playerGroup.rotation.y) * 2.2;
                    const spawnZ = playerGroup.position.z + Math.cos(playerGroup.rotation.y) * 2.2;
                    wall.position.set(spawnX, getTerrainHeight(spawnX, spawnZ) + 1.0, spawnZ);
                    wall.rotation.y = playerGroup.rotation.y;
                    scene.add(wall);
                }
            };

            // Joystick
            let joystickVector = { x: 0, y: 0 };
            const baseEl = document.getElementById('joystick-base');
            const knobEl = document.getElementById('joystick-knob');

            function handleJoystick(e) {
                const rect = baseEl.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                let dx = touch.clientX - (rect.left + rect.width / 2);
                let dy = touch.clientY - (rect.top + rect.height / 2);
                const dist = Math.hypot(dx, dy);
                const maxR = 40;

                if (dist > maxR) { dx = (dx / dist) * maxR; dy = (dy / dist) * maxR; }
                knobEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joystickVector = dist < 5 ? { x: 0, y: 0 } : { x: dx / maxR, y: dy / maxR };
            }

            function resetJoystick() {
                knobEl.style.transform = `translate(-50%, -50%)`;
                joystickVector = { x: 0, y: 0 };
            }

            baseEl.addEventListener('pointerdown', (e) => { baseEl.setPointerCapture(e.pointerId); handleJoystick(e); });
            baseEl.addEventListener('pointermove', (e) => { if (baseEl.hasPointerCapture(e.pointerId)) handleJoystick(e); });
            baseEl.addEventListener('pointerup', (e) => { baseEl.releasePointerCapture(e.pointerId); resetJoystick(); });

            // Camera System: 3rd Person Over-the-Shoulder Tracking & Controls
            let isAutoCam = false;
            let cameraAngle = 0; // Horizontal orbit angle around player
            let camRotInput = 0;

            const camModeBtn = document.getElementById('btn-cam-mode');
            camModeBtn.onclick = () => {
                isAutoCam = !isAutoCam;
                camModeBtn.innerText = isAutoCam ? '🎥 AUTO' : '🔒 FREE';
                camModeBtn.style.background = isAutoCam ? '#ffaa00' : 'rgba(0, 255, 204, 0.85)';
            };

            function bindCam(id, val) {
                const b = document.getElementById(id);
                b.addEventListener('pointerdown', () => camRotInput = val);
                b.addEventListener('pointerup', () => camRotInput = 0);
                b.addEventListener('pointerleave', () => camRotInput = 0);
            }
            bindCam('btn-cam-left', -1);
            bindCam('btn-cam-right', 1);

            // Modal Controls
            const menuModal = document.getElementById('menu-modal');
            document.getElementById('btn-menu-open').onclick = () => {
                updateUI();
                menuModal.style.display = 'flex';
            };
            document.getElementById('btn-menu-close').onclick = () => {
                menuModal.style.display = 'none';
            };

            updateUI();

            // --- Game Loop ---
            const clock = new THREE.Clock();

            // 3rd Person Distance Parameters
            const CAM_DISTANCE = 8.5;  // Distance behind player
            const CAM_HEIGHT = 4.0;    // Elevation over shoulder/head

            function animate() {
                requestAnimationFrame(animate);
                const delta = clock.getDelta();

                // Manual Camera Rotation
                if (camRotInput !== 0) {
                    cameraAngle += camRotInput * 2.2 * delta;
                }

                const jx = joystickVector.x;
                const jy = joystickVector.y;

                if (Math.abs(jx) > 0.05 || Math.abs(jy) > 0.05) {
                    const moveSpeed = 7.5;

                    // Move relative to current camera viewing angle
                    const dx = (jx * Math.cos(cameraAngle) + jy * Math.sin(cameraAngle)) * moveSpeed * delta;
                    const dz = (-jx * Math.sin(cameraAngle) + jy * Math.cos(cameraAngle)) * moveSpeed * delta;

                    playerGroup.position.x += dx;
                    playerGroup.position.z += dz;

                    // Rotate player to face movement direction
                    const targetAngle = Math.atan2(dx, dz);
                    playerGroup.rotation.y = targetAngle;

                    // Auto-Follow Camera smooth catch-up
                    if (isAutoCam && camRotInput === 0) {
                        let desiredAngle = targetAngle + Math.PI;
                        let diff = Math.atan2(Math.sin(desiredAngle - cameraAngle), Math.cos(desiredAngle - cameraAngle));
                        cameraAngle += diff * delta * 2.5;
                    }
                }

                // Gravity & Height Snap
                const groundY = getTerrainHeight(playerGroup.position.x, playerGroup.position.z);
                if (isGrounded) {
                    playerGroup.position.y = groundY;
                } else {
                    playerGroup.position.y += playerVY;
                    playerVY -= 0.8 * delta;
                    if (playerGroup.position.y <= groundY) {
                        playerGroup.position.y = groundY;
                        playerVY = 0;
                        isGrounded = true;
                    }
                }

                // Closest Target Lock Highlight
                let closest = null;
                let minDist = 3.0;
                harvestables.forEach(h => {
                    const d = Math.hypot(playerGroup.position.x - h.x, playerGroup.position.z - h.z);
                    if (d < minDist) { minDist = d; closest = h; }
                });

                if (closest) {
                    targetRing.position.set(closest.x, getTerrainHeight(closest.x, closest.z) + 0.1, closest.z);
                    targetRing.visible = true;
                } else {
                    targetRing.visible = false;
                }

                // 3rd Person Over-The-Shoulder Camera Positioning
                camera.position.x = playerGroup.position.x + Math.sin(cameraAngle) * CAM_DISTANCE;
                camera.position.z = playerGroup.position.z + Math.cos(cameraAngle) * CAM_DISTANCE;
                camera.position.y = playerGroup.position.y + CAM_HEIGHT;

                // Look directly at player's torso/head center
                camera.lookAt(
                    playerGroup.position.x, 
                    playerGroup.position.y + 1.4, 
                    playerGroup.position.z
                );

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        });
    </script>
</body>
